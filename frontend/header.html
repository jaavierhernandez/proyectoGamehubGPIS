<style>
.gh-nav-menu {
    position: absolute;
    top: 120px;
    left: 0;
    background: #0a0c14;
    border: 1px solid #1e2540;
    border-top: none;
    min-width: 220px;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    display: none;
    z-index: 9999;
}
.gh-nav-menu.open { display: block; }
.gh-nav-menu a {
    display: block;
    padding: 16px 24px;
    color: #e8eaf0;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    border-bottom: 1px solid #1e2540;
    transition: background 0.2s, color 0.2s;
}
.gh-nav-menu a:last-child { border-bottom: none; }
.gh-nav-menu a:hover { background: #1a1e2e; color: #18a8ff; }

.gh-header {
    width: 100%;
    background: #0a0c14;
    border-bottom: 1px solid #1e2540;
    padding: 0 60px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 48px;
    box-sizing: border-box;
    position: relative;
}
.gh-header-left {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
}
.gh-header-search {
    flex: 1;
    max-width: 700px;
    position: relative;
}
.gh-header-search input {
    width: 100%;
    background: #1a1e2e;
    border: 1px solid #1e2540;
    border-radius: 28px;
    padding: 14px 24px 14px 52px;
    color: #e8eaf0;
    font-size: 18px;
    outline: none;
    box-sizing: border-box;
}
.gh-header-right {
    display: flex;
    align-items: center;
    gap: 60px;
    flex-shrink: 0;
}
.gh-idioma {
    color: #e8eaf0;
    font-size: 28px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.2s;
    display: inline-block;
}

@media (max-width: 768px) {
    .gh-header {
        padding: 12px 16px;
        height: auto;
        flex-wrap: wrap;
        gap: 12px;
    }
    .gh-header-search {
        order: 3;
        max-width: 100%;
        width: 100%;
        flex: unset;
    }
    .gh-header-search input {
        font-size: 14px;
        padding: 10px 16px 10px 40px;
    }
    .gh-idioma { display: none; }
    .gh-header-right { gap: 20px; }
    .gh-nav-menu { top: auto; }
}
</style>

<header class="gh-header">
    <div class="gh-header-left">
        <div style="position:relative;">
            <div onclick="document.getElementById('ghNav').classList.toggle('open')" style="cursor:pointer;display:flex;flex-direction:column;gap:6px;padding:8px;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                <span style="display:block;width:30px;height:3px;background:#e8eaf0;border-radius:2px;"></span>
                <span style="display:block;width:30px;height:3px;background:#e8eaf0;border-radius:2px;"></span>
                <span style="display:block;width:30px;height:3px;background:#e8eaf0;border-radius:2px;"></span>
            </div>
            <div id="ghNav" class="gh-nav-menu">
                <a href="http://gamehub.local/pagina-de-inicio/">🏠 Inicio</a>
                <a href="http://gamehub.local/pagina-de-registro-e-inicio-de-sesion/">🔑 Identificación</a>
                <a href="http://gamehub.local/pagina-de-catalogo-de-videojuegos/">🎮 Catálogo</a>
                <a href="http://gamehub.local/pagina-de-noticias/">📰 Noticias</a>
                <a href="http://gamehub.local/blog-de-opinion-con-sistema-de-comentarios/">✍️ Blog</a>
            </div>
        </div>
        <a href="http://gamehub.local/pagina-de-inicio/" style="flex-shrink:0;text-decoration:none;margin-top:10px;transition:transform 0.2s;display:inline-block;" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
            <img src="http://gamehub.local/wp-content/uploads/2026/05/logo.png" alt="GameHub" style="height:100px;width:auto;">
        </a>
    </div>

    <div class="gh-header-search">
        <input type="text" placeholder="Buscar juegos, servicios, o usuarios...">
        <svg style="position:absolute;left:18px;top:50%;transform:translateY(-50%);width:22px;height:22px;" viewBox="0 0 24 24">
            <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#7a8099" stroke-width="2" fill="none"/>
        </svg>
    </div>

    <div class="gh-header-right">
        <span class="gh-idioma" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">Idioma ▾ ES</span>
        <div style="cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#e8eaf0" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </div>
        <div style="cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#e8eaf0" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
        </div>
        <a href="http://gamehub.local/dashboard-suscriptor/" style="text-decoration:none;display:flex;align-items:center;justify-content:center;width:68px;height:68px;border-radius:50%;background:#1e2540;border:2px solid #2a3050;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#7a8099" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </a>
    </div>
</header>

<script>
document.addEventListener('click', function(e) {
    var nav = document.getElementById('ghNav');
    if (nav && !e.target.closest('#ghNav') && !e.target.closest('[onclick]')) {
        nav.classList.remove('open');
    }
});
</script>
