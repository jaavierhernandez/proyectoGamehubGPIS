function gamehub_auth_page() {
    ob_start();

    echo '
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

	.auth-page-wrapper {
	  background: #0a0c14;
	  min-height: calc(100vh - 90px);
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  font-family: sans-serif;
	  color: #e8eaf0;
	  padding: 40px 20px;
	  position: relative;
	}
	  
      .auth-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 460px;
      }

      .auth-card {
        background: #0f1220;
        border: 1px solid #1e2540;
        border-radius: 16px;
        padding: 40px 36px;
        position: relative;
        overflow: hidden;
      }

      .auth-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #1a6fff, #00d4ff, #1a6fff, transparent);
      }

      .auth-card.register::before {
        background: linear-gradient(90deg, transparent, #7b2fff, #a855f7, #7b2fff, transparent);
      }

      .auth-avatar {
        width: 72px; height: 72px;
        border-radius: 50%;
        border: 2px solid #1a6fff;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px;
        background: rgba(26,111,255,0.1);
      }

      .auth-card.register .auth-avatar { border-color: #7b2fff; background: rgba(123,47,255,0.1); }
      .auth-avatar svg { width: 34px; height: 34px; stroke: #1a6fff; }
      .auth-card.register .auth-avatar svg { stroke: #a855f7; }

      .auth-title {
        text-align: center;
        font-size: 22px; font-weight: 700;
        letter-spacing: 3px; text-transform: uppercase;
        color: #fff; margin-bottom: 6px;
        display: flex; align-items: center; justify-content: center; gap: 10px;
      }

      .auth-title::before, .auth-title::after { content: ""; flex: 1; height: 1px; }
      .auth-title::before { background: linear-gradient(90deg, transparent, #1a6fff); }
      .auth-title::after  { background: linear-gradient(90deg, #1a6fff, transparent); }
      .auth-card.register .auth-title::before { background: linear-gradient(90deg, transparent, #7b2fff); }
      .auth-card.register .auth-title::after  { background: linear-gradient(90deg, #7b2fff, transparent); }

      .auth-divider { height: 1px; background: linear-gradient(90deg, transparent, #1e2540, transparent); margin: 20px 0; }

      .auth-form { display: flex; flex-direction: column; gap: 16px; }
      .form-group { display: flex; flex-direction: column; gap: 6px; }
      .form-label { font-size: 13px; color: #a0a8be; font-weight: 600; letter-spacing: 0.5px; }
      .form-label span { color: #1a6fff; }
      .auth-card.register .form-label span { color: #a855f7; }

      .input-wrapper { position: relative; display: flex; align-items: center; }
      .input-icon { position: absolute; left: 14px; width: 18px; height: 18px; stroke: #4a5280; pointer-events: none; }

      .form-input {
        width: 100%; background: #141828; border: 1px solid #1e2540;
        border-radius: 8px; padding: 12px 14px 12px 44px;
        color: #e8eaf0; font-size: 15px; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-input::placeholder { color: #3a4060; }
      .form-input:focus { border-color: #1a6fff; box-shadow: 0 0 0 3px rgba(26,111,255,0.1); }
      .auth-card.register .form-input:focus { border-color: #7b2fff; box-shadow: 0 0 0 3px rgba(123,47,255,0.1); }

      .toggle-password { position: absolute; right: 14px; background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; }
      .toggle-password svg { width: 18px; height: 18px; stroke: #4a5280; transition: stroke 0.2s; }
      .toggle-password:hover svg { stroke: #a0a8be; }

      .form-remember { display: flex; align-items: center; gap: 10px; cursor: pointer; }
      .form-remember input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1a6fff; cursor: pointer; }
      .form-remember span { font-size: 14px; color: #a0a8be; }

      .btn-auth { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s, transform 0.1s; margin-top: 4px; }
      .btn-login { background: linear-gradient(135deg, #1a6fff, #00d4ff); color: #0a0c14; box-shadow: 0 4px 20px rgba(26,111,255,0.4); }
      .btn-login:hover { box-shadow: 0 6px 28px rgba(26,111,255,0.6); transform: translateY(-1px); }
      .btn-register { background: linear-gradient(135deg, #7b2fff, #a855f7); color: #fff; box-shadow: 0 4px 20px rgba(123,47,255,0.4); }
      .btn-register:hover { box-shadow: 0 6px 28px rgba(123,47,255,0.6); transform: translateY(-1px); }
      .btn-auth:active { transform: translateY(0); }

      .auth-links { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 20px; }
      .auth-link { font-size: 13px; color: #7a8099; cursor: pointer; background: none; border: none; padding: 0; transition: color 0.2s; text-decoration: none; display: flex; align-items: center; gap: 4px; }
      .auth-link:hover { color: #1a6fff; }
      .auth-card.register .auth-link:hover { color: #a855f7; }
      .auth-link span { color: #1a6fff; font-weight: 600; }
      .auth-card.register .auth-link span { color: #a855f7; }

      .panel { display: none; }
      .panel.active { display: block; }
	  
	  body.page .site-content,
		body.page #content,
		body.page .entry-content,
		body.page main,
		body.page #main {
		  background: #0a0c14 !important;
		}

		body.page {
		  background: #0a0c14 !important;
		}

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .panel.active { animation: fadeIn 0.25s ease; }
    </style>

    <div class="auth-page-wrapper">
      <div class="auth-container">

        <div class="auth-card" id="card-login">
          <div class="auth-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="auth-title">Bienvenido de nuevo</div>
          <div class="auth-divider"></div>
          <div class="panel active" id="panel-login">
            <div class="auth-form">
              <div class="form-group">
                <label class="form-label">Usuario <span>*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  <input type="text" class="form-input" placeholder="Ingresa tu usuario">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Contraseña <span>*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <input type="password" class="form-input" id="pwd-login" placeholder="Ingresa tu contraseña">
                  <button class="toggle-password" onclick="togglePwd(\'pwd-login\')">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <label class="form-remember">
                <input type="checkbox">
                <span>Recordarme</span>
              </label>
              <button class="btn-auth btn-login">Iniciar Sesión</button>
            </div>
            <div class="auth-links">
              <button class="auth-link" onclick="switchToGH(\'register\')">¿No tienes una cuenta? <span>›</span></button>
            </div>
          </div>
        </div>

        <div class="auth-card register" id="card-register" style="display:none;">
          <div class="auth-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="auth-title">Crear una cuenta</div>
          <div class="auth-divider"></div>
          <div class="auth-form">
            <div class="form-group">
              <label class="form-label">Nombre <span>*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" class="form-input" placeholder="Ingresa tu nombre">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Apellido <span>*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" class="form-input" placeholder="Ingresa tu apellido">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Correo electrónico <span>*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" class="form-input" placeholder="Ingresa tu correo electrónico">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Contraseña <span>*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" class="form-input" id="pwd-reg1" placeholder="Crea una contraseña">
                <button class="toggle-password" onclick="togglePwd(\'pwd-reg1\')">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirmar contraseña <span>*</span></label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" class="form-input" id="pwd-reg2" placeholder="Confirma tu contraseña">
                <button class="toggle-password" onclick="togglePwd(\'pwd-reg2\')">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button class="btn-auth btn-register">Registrarse</button>
          </div>
          <div class="auth-links">
            <button class="auth-link" onclick="switchToGH(\'login\')">¿Ya tienes una cuenta? <span>›</span></button>
          </div>
        </div>

      </div>
    </div>

    <script>
	  function switchToGH(panel) {
		var login = document.getElementById("card-login");
		var register = document.getElementById("card-register");
		if (panel === "register") {
		  login.style.display = "none";
		  register.style.display = "block";
		} else {
		  register.style.display = "none";
		  login.style.display = "block";
		}
	  }

	  function togglePwd(id) {
		var input = document.getElementById(id);
		input.type = input.type === "password" ? "text" : "password";
	  }

	  document.querySelector(".btn-login").addEventListener("click", function() {
		var login = document.querySelector("#card-login .form-input:nth-of-type(1)").value;
		var password = document.querySelector("#pwd-login").value;
		fetch("/wp-content/themes/gamehub/backend_gamehub/login.php", {
		  method: "POST",
		  headers: { "Content-Type": "application/json" },
		  body: JSON.stringify({ login: login, password: password })
		})
		.then(r => r.json())
		.then(data => {
		  if (data.ok) {
			window.location.href = "/" + data.redirigir;
		  } else {
			alert(data.mensaje);
		  }
		})
		.catch(() => alert("Error de conexión con el servidor."));
	  });

	  document.querySelector(".btn-register").addEventListener("click", function() {
		var nombre = document.querySelectorAll("#card-register .form-input")[0].value;
		var apellido = document.querySelectorAll("#card-register .form-input")[1].value;
		var email = document.querySelectorAll("#card-register .form-input")[2].value;
		var password = document.getElementById("pwd-reg1").value;
		var password2 = document.getElementById("pwd-reg2").value;

		if (password !== password2) {
		  alert("Las contraseñas no coinciden.");
		  return;
		}

		fetch("/wp-content/themes/gamehub/backend_gamehub/registro.php", {
		  method: "POST",
		  headers: { "Content-Type": "application/json" },
		  body: JSON.stringify({
			nombre: nombre + " " + apellido,
			email: email,
			password: password,
			alias: email.split("@")[0]
		  })
		})
		.then(r => r.json())
		.then(data => {
		  if (data.ok) {
			alert("¡Cuenta creada correctamente! Ahora puedes iniciar sesión.");
			switchToGH("login");
		  } else {
			alert(data.mensaje);
		  }
		})
		.catch(() => alert("Error de conexión con el servidor."));
	  });
	</script>
    ';

    return ob_get_clean();
}
add_shortcode('gamehub_auth', 'gamehub_auth_page');
